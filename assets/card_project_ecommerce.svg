<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 180" width="100%" height="100%">
  <style>
    .bg { fill: #050814; stroke: #1e293b; stroke-width: 1.5; rx: 12px; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 15px; fill: #ffffff; }
    .tagline { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 11px; fill: #3b82f6; }
    .desc { font-family: system-ui, -apple-system, sans-serif; font-size: 10.5px; fill: #94a3b8; }
    .badge { fill: #1e293b; rx: 4px; }
    .badge-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 9px; fill: #cbd5e1; text-anchor: middle; }
    .featured { fill: #2563eb; rx: 3px; }
    .featured-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 8px; fill: #ffffff; text-anchor: middle; }
    .icon { fill: #3b82f6; }
  </style>

  <!-- Card Background -->
  <rect x="1" y="1" width="248" height="178" rx="12" class="bg" />

  <!-- Header Icon & Title -->
  <g transform="translate(15, 20)">
    <path class="icon" d="M 5 14 A 1 1 0 1 0 5 16 A 1 1 0 1 0 5 14 Z M 11 14 A 1 1 0 1 0 11 16 A 1 1 0 1 0 11 14 Z M 1 1 L 3 1 L 5 10 L 12 10 L 14 3 L 3.5 3" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="scale(1.1)"/>
    <text x="22" y="11" class="title">E-Commerce</text>
  </g>

  <!-- Featured Badge -->
  <rect x="180" y="18" width="55" height="15" class="featured" />
  <text x="207.5" y="28.5" class="featured-text">Featured</text>

  <!-- Tagline -->
  <text x="15" y="60" class="tagline">Full Stack E-Commerce</text>

  <!-- Description (wrapped) -->
  <text x="15" y="78" class="desc">
    <tspan x="15" dy="0">E-commerce platform with cart,</tspan>
    <tspan x="15" dy="16">checkout, order management</tspan>
    <tspan x="15" dy="16">and secure payment gateways.</tspan>
  </text>

  <!-- Tech Capsules -->
  <g transform="translate(15, 140)">
    <!-- React -->
    <rect x="0" y="0" width="45" height="16" class="badge" />
    <text x="22.5" y="11" class="badge-text">React</text>

    <!-- Node -->
    <rect x="50" y="0" width="45" height="16" class="badge" />
    <text x="72.5" y="11" class="badge-text">Node</text>

    <!-- MySQL -->
    <rect x="100" y="0" width="50" height="16" class="badge" />
    <text x="125" y="11" class="badge-text">MySQL</text>
  </g>
</svg>
