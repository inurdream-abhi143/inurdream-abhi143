<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="100%">
  <style>
    .bg { fill: #050814; stroke: #1e293b; stroke-width: 1.5; rx: 12px; }
    .divider { stroke: #1e293b; stroke-width: 1; }
    .val { font-family: system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 22px; fill: #ffffff; text-anchor: middle; }
    .lbl { font-family: system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #94a3b8; text-anchor: middle; letter-spacing: 0.5px; }
    .icon { fill: #3b82f6; opacity: 0.95; }
    .icon-glow { filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.6)); }
  </style>

  <!-- Card Background -->
  <rect x="1" y="1" width="798" height="118" rx="12" class="bg" />

  <!-- Dividers -->
  <line x1="160" y1="20" x2="160" y2="100" class="divider" />
  <line x1="320" y1="20" x2="320" y2="100" class="divider" />
  <line x1="480" y1="20" x2="480" y2="100" class="divider" />
  <line x1="640" y1="20" x2="640" y2="100" class="divider" />

  <!-- Item 1: Projects -->
  <g transform="translate(80, 0)">
    <!-- Rocket Icon -->
    <path class="icon icon-glow" d="M -10 20 L -6 14 L -6 8 L -10 4 L -6 4 L -4 8 L 0 0 L 4 8 L 6 4 L 10 4 L 6 8 L 6 14 L 10 20 L 4 18 L 0 22 L -4 18 Z" transform="translate(0, 22) scale(1.1)"/>
    <text y="72" class="val">10+</text>
    <text y="92" class="lbl">Projects</text>
  </g>

  <!-- Item 2: Experience -->
  <g transform="translate(240, 0)">
    <!-- Code Icon -->
    <path class="icon icon-glow" d="M -10 10 L -4 4 L -4 6 L -8 10 L -4 14 L -4 16 Z M 10 10 L 4 4 L 4 6 L 8 10 L 4 14 L 4 16 Z M -2 17 L 2 3 L 4 3 L 0 17 Z" transform="translate(0, 22) scale(1.1)"/>
    <text y="72" class="val">2+</text>
    <text y="92" class="lbl">Years of Experience</text>
  </g>

  <!-- Item 3: Commits -->
  <g transform="translate(400, 0)">
    <!-- GitHub Commit Icon -->
    <circle cx="0" cy="22" r="6" stroke="#3b82f6" stroke-width="3" fill="none" class="icon-glow" />
    <line x1="-12" y1="22" x2="-6" y2="22" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" class="icon-glow" />
    <line x1="6" y1="22" x2="12" y2="22" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" class="icon-glow" />
    <text y="72" class="val">250+</text>
    <text y="92" class="lbl">Commits</text>
  </g>

  <!-- Item 4: Repositories -->
  <g transform="translate(560, 0)">
    <!-- Folder/Repo Icon -->
    <path class="icon icon-glow" d="M -10 6 L -10 18 C -10 19 2 19 10 18 L 10 8 C 10 7 8 6 6 6 L 0 6 L -2 4 L -8 4 C -9 4 -10 5 -10 6 Z" transform="translate(0, 20) scale(1.1)"/>
    <text y="72" class="val">20+</text>
    <text y="92" class="lbl">Repositories</text>
  </g>

  <!-- Item 5: LeetCode -->
  <g transform="translate(720, 0)">
    <!-- Star Icon -->
    <path class="icon icon-glow" fill="#a855f7" d="M 0 4 L 3 10 L 10 11 L 5 15 L 7 21 L 0 18 L -7 21 L -5 15 L -10 11 L -3 10 Z" transform="translate(0, 20) scale(1.1)"/>
    <text y="72" class="val" style="fill: #a855f7;">5★</text>
    <text y="92" class="lbl">LeetCode Rating</text>
  </g>
</svg>
