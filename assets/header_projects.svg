<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 50" width="100%" height="50">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; filter: drop-shadow(0 0 6px rgba(37, 99, 235, 0.8)); }
    }
    .header-text {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-weight: 800;
      font-size: 20px;
      fill: url(#text-grad);
      letter-spacing: 2px;
      animation: pulse 4s ease-in-out infinite;
    }
    .brackets {
      fill: #9333ea;
      font-family: monospace;
      font-weight: 700;
      font-size: 22px;
      opacity: 0.8;
    }
    .index-no {
      fill: #2563eb;
      font-family: monospace;
      font-weight: 700;
      font-size: 14px;
    }
  </style>
  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
  </defs>
  <text x="10" y="32" class="brackets">[</text>
  <text x="25" y="28" class="index-no">04</text>
  <text x="45" y="32" class="brackets">//</text>
  <text x="75" y="32" class="header-text">FEATURED PROJECTS</text>
  <text x="290" y="32" class="brackets">]</text>
</svg>
