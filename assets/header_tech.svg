<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 200" width="100%" height="100%">
  <style>
    .bg { fill: #050814; stroke: #1e293b; stroke-width: 1.5; rx: 12px; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 14px; fill: #ffffff; }
    .item-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 12.5px; fill: #e2e8f0; }
    .item-sub { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #64748b; }
    .bullet { fill: #3b82f6; filter: drop-shadow(0 0 2px rgba(59, 130, 246, 0.8)); }
    .header-icon { fill: #3b82f6; }
    .divider { stroke: #1e293b; stroke-width: 1; }
  </style>

  <!-- Card Background -->
  <rect x="1" y="1" width="388" height="198" rx="12" class="bg" />

  <!-- Header -->
  <g transform="translate(20, 22)">
    <path class="header-icon" d="M 0 6 L 6 0 L 12 6 L 6 12 Z M 3 6 L 6 3 L 9 6 L 6 9 Z" transform="scale(1.2)"/>
    <text x="25" y="10" class="title">Frontend &amp; Mobile</text>
  </g>

  <line x1="20" y1="42" x2="370" y2="42" class="divider" />

  <!-- Grid Items (2x3) -->
  <g transform="translate(20, 55)">
    <!-- Row 1, Col 1: React -->
    <g transform="translate(10, 15)">
      <circle cx="5" cy="5" r="3.5" class="bullet" fill="#61dafb" style="filter: drop-shadow(0 0 2.5px #61dafb);" />
      <text x="20" y="8" class="item-text">React</text>
      <text x="20" y="20" class="item-sub">Library</text>
    </g>

    <!-- Row 1, Col 2: Next.js -->
    <g transform="translate(190, 15)">
      <circle cx="5" cy="5" r="3.5" class="bullet" fill="#ffffff" style="filter: drop-shadow(0 0 2.5px #ffffff);" />
      <text x="20" y="8" class="item-text">Next.js</text>
      <text x="20" y="20" class="item-sub">Framework</text>
    </g>

    <!-- Row 2, Col 1: TypeScript -->
    <g transform="translate(10, 60)">
      <circle cx="5" cy="5" r="3.5" class="bullet" fill="#3178c6" style="filter: drop-shadow(0 0 2.5px #3178c6);" />
      <text x="20" y="8" class="item-text">TypeScript</text>
      <text x="20" y="20" class="item-sub">Language</text>
    </g>

    <!-- Row 2, Col 2: Tailwind CSS -->
    <g transform="translate(190, 60)">
      <circle cx="5" cy="5" r="3.5" class="bullet" fill="#38bdf8" style="filter: drop-shadow(0 0 2.5px #38bdf8);" />
      <text x="20" y="8" class="item-text">Tailwind CSS</text>
      <text x="20" y="20" class="item-sub">Styling</text>
    </g>

    <!-- Row 3, Col 1: Redux Toolkit -->
    <g transform="translate(10, 105)">
      <circle cx="5" cy="5" r="3.5" class="bullet" fill="#764abc" style="filter: drop-shadow(0 0 2.5px #764abc);" />
      <text x="20" y="8" class="item-text">Redux Toolkit</text>
      <text x="20" y="20" class="item-sub">State System</text>
    </g>

    <!-- Row 3, Col 2: Bootstrap -->
    <g transform="translate(190, 105)">
      <circle cx="5" cy="5" r="3.5" class="bullet" fill="#7952b3" style="filter: drop-shadow(0 0 2.5px #7952b3);" />
      <text x="20" y="8" class="item-text">Bootstrap</text>
      <text x="20" y="20" class="item-sub">CSS Library</text>
    </g>
  </g>
</svg>
