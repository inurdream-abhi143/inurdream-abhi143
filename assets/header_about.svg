<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 350" width="100%" height="100%">
  <style>
    .bg { fill: #050814; stroke: #1e293b; stroke-width: 1.5; rx: 12px; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 16px; fill: #ffffff; }
    .item-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12.5px; fill: #e2e8f0; }
    .bullet { fill: #3b82f6; filter: drop-shadow(0 0 2px rgba(59, 130, 246, 0.8)); }
    .header-icon { fill: #9333ea; }
    .divider { stroke: #1e293b; stroke-width: 1; }
  </style>

  <!-- Card Background -->
  <rect x="1" y="1" width="388" height="348" rx="12" class="bg" />

  <!-- Header -->
  <g transform="translate(20, 25)">
    <!-- User Icon -->
    <path class="header-icon" d="M 6 2 A 4 4 0 1 0 6 10 A 4 4 0 1 0 6 2 Z M 12 16 A 6 6 0 0 0 0 16 Z" transform="scale(1.2)"/>
    <text x="25" y="11" class="title">About Me</text>
  </g>

  <line x1="20" y1="50" x2="370" y2="50" class="divider" />

  <!-- Bullets List -->
  <g transform="translate(20, 75)">
    <!-- Bullet 1 -->
    <g transform="translate(0, 10)">
      <circle cx="5" cy="5" r="3.5" class="bullet" />
      <text x="20" y="9" class="item-text">MERN Stack Specialist &amp; Full Stack Developer</text>
    </g>
    
    <!-- Bullet 2 -->
    <g transform="translate(0, 48)">
      <circle cx="5" cy="5" r="3.5" class="bullet" />
      <text x="20" y="9" class="item-text">Built CMS, Admin Panels &amp; Secure RESTful APIs</text>
    </g>

    <!-- Bullet 3 -->
    <g transform="translate(0, 86)">
      <circle cx="5" cy="5" r="3.5" class="bullet" />
      <text x="20" y="9" class="item-text">Deep understanding of RBAC, JWT &amp; Architecture</text>
    </g>

    <!-- Bullet 4 -->
    <g transform="translate(0, 124)">
      <circle cx="5" cy="5" r="3.5" class="bullet" />
      <text x="20" y="9" class="item-text">Passionate about clean code, UI/UX &amp; performance</text>
    </g>

    <!-- Bullet 5 -->
    <g transform="translate(0, 162)">
      <circle cx="5" cy="5" r="3.5" class="bullet" />
      <text x="20" y="9" class="item-text">Currently working as Full Stack Developer at UIUX Studio</text>
    </g>

    <!-- Bullet 6 -->
    <g transform="translate(0, 200)">
      <circle cx="5" cy="5" r="3.5" class="bullet" fill="#a855f7" style="filter: drop-shadow(0 0 2px rgba(168, 85, 247, 0.85));"/>
      <text x="20" y="9" class="item-text" style="font-weight: 600;">Open to full-time remote/onsite opportunities</text>
    </g>
  </g>
</svg>
